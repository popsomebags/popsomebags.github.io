    <main>
        <h2>Form</h2>

        <div>
            <form action="#">
                <label for="name">Full Name:</label><br>
                <input required type="text" id="name" name="name" placeholder="William Zhang"><br>
                <label for="phonenumber">Phone Number:</label><br>
                <input required type="text" id="phonenumber" name="phonenumber"><br>
                <label for="email">Email Address:</label><br>
                <input required type="text" id="email" name="email"><br>
                <label for="chocolate"><input id="chocolate" type="checkbox" name="icecream">Chocolate</label>
                <label for="vanilla"><input id="vanilla" type="checkbox" name="icecream">Vanilla</label><br>
                <label for="spotify"><input id="spotify" type="radio" name="music">Spotify</label>
                <label for="applemusic"><input id="applemusic" type="radio" name="music">Apple Music</label><br>
                <label for="drink">Choose your favorite drink:</label><br>
                <select name="drink" id="drink" required>
                    <option value="" disabled selected hidden>Select one...</option>
                    <option value="water">Water</option>
                    <option value="coke">Coke</option>
                    <option value="pepsi">Pepsi</option>
                    <option value="fanta">Fanta</option>
                </select><br>
                <button type="reset" value="Reset">Reset</button>
                <button type="submit" value="Submit">Submit</button>
            </form>
        </div>
